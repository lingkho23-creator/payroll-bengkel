<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Console - SACBW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root { --primary: #2563eb; --background: #f1f5f9; }
        body { background-color: var(--background); font-family: 'Inter', sans-serif; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .sidebar-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 0.5rem; display: block; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-[1400px] mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Wage <span class="text-red-600">Simulator</span></h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">San Andreas Council of Business & Welfare</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Server Time</p>
                    <p id="currentTime" class="text-sm font-semibold text-slate-700">00:00:00</p>
                </div>
                <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-[10px] font-bold text-white">HQ</div>
                    <span class="text-xs font-bold text-slate-600">Admin Console</span>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 space-y-6">
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                    <span class="sidebar-label">Revenue & Global Expense</span>
                    <div class="space-y-4">
                        <div class="relative">
                            <i class="fas fa-dollar-sign absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="number" id="totalRevenue" class="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-10 pr-4 py-4 text-lg font-bold text-slate-800 outline-none" value="1500000" oninput="calculateAll()">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="spending" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-semibold text-slate-700 outline-none" placeholder="Spending" value="50000" oninput="calculateAll()">
                            <input type="number" id="material" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-semibold text-slate-700 outline-none" placeholder="Material" value="250000" oninput="calculateAll()">
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                    <span class="sidebar-label">Activity Database</span>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="totalStaff" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-semibold text-slate-700 outline-none" value="12" oninput="calculateAll()">
                            <input type="number" id="totalHours" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-semibold text-slate-700 outline-none" value="300" oninput="calculateAll()">
                        </div>
                        <input type="number" id="totalPoints" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-semibold text-slate-700 outline-none" value="8000" oninput="calculateAll()">
                    </div>
                </div>
            </aside>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-blue-600 rounded-3xl p-6 text-white shadow-lg">
                        <p class="text-xs font-bold text-blue-100 uppercase mb-1">Net Income</p>
                        <h3 id="netProfit" class="text-3xl font-black">$0</h3>
                    </div>
                    <div class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">PUG Allocation</p>
                        <h3 id="pugAmount" class="text-3xl font-black text-slate-800">$0</h3>
                    </div>
                    <div class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">Vault</p>
                        <h3 id="companyVault" class="text-3xl font-black text-emerald-600">$0</h3>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-3xl p-8 text-white relative shadow-2xl">
                    <div class="relative z-10">
                        <h3 class="text-xl font-bold mb-4">Staff Wage Simulator</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="staffHours" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 font-bold text-white outline-none" value="40" oninput="calculateAll()">
                                <input type="number" id="staffPoints" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 font-bold text-white outline-none" value="1000" oninput="calculateAll()">
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] font-bold text-slate-400 block uppercase">Take Home Pay</span>
                                <span id="staffNet" class="text-4xl font-black text-blue-400">$0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-12 pb-8 flex flex-col items-center gap-4">
            <nav class="bg-[#0f172a] px-6 py-3 rounded-2xl flex gap-6 shadow-xl border border-white/5">
                <button class="text-xs font-bold text-blue-400 uppercase tracking-widest">Simulator</button>
                <button class="text-xs font-bold text-slate-400 uppercase tracking-widest">Documentation</button>
            </nav>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">&copy; 2026 San Andreas Council of Business & Welfare</p>
        </footer>
    </div>

    <script>
        function updateTime() {
            document.getElementById('currentTime').innerText = new Date().toLocaleTimeString('id-ID');
        }
        setInterval(updateTime, 1000);

        function formatUSD(val) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(Math.floor(val));
        }

        function calculateAll() {
            const rev = parseFloat(document.getElementById('totalRevenue').value) || 0;
            const spend = parseFloat(document.getElementById('spending').value) || 0;
            const mat = parseFloat(document.getElementById('material').value) || 0;
            
            // Basic Financials
            const netProfit = rev - spend - mat;
            const pug = netProfit * 0.50; // Default 50%
            const vault = netProfit - pug;

            // Staff Sim
            const nStaff = parseInt(document.getElementById('totalStaff').value) || 1;
            const totHours = parseFloat(document.getElementById('totalHours').value) || 1;
            const totPoints = parseFloat(document.getElementById('totalPoints').value) || 1;
            const sH = parseFloat(document.getElementById('staffHours').value) || 0;
            const sP = parseFloat(document.getElementById('staffPoints').value) || 0;

            const sGross = (pug * 0.15 / nStaff) + ((sH / totHours) * (pug * 0.15)) + ((sP / totPoints) * (pug * 0.70));

            document.getElementById('netProfit').innerText = formatUSD(netProfit);
            document.getElementById('pugAmount').innerText = formatUSD(pug);
            document.getElementById('companyVault').innerText = formatUSD(vault);
            document.getElementById('staffNet').innerText = formatUSD(sGross);
        }
        window.onload = calculateAll;
    </script>
</body>
</html>
